<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/ag-theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THEMACHINE Office</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root { --bg: #0d0d12; --gold: #d4af37; --cyan: #00ffff; --green: #00ff00; --card-bg:#12121a; --card-border:#1e1e2e; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html,body{background:var(--bg);color:#fff;font-family:'Press Start 2P',monospace;min-height:100vh;overflow:hidden}

/* NAV - Unified style */
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:2px solid var(--cyan);background:rgba(0,0,0,0.8);position:sticky;top:0;z-index:100}
.nav-logo{font-size:clamp(12px,2vw,16px);color:var(--gold);text-shadow:2px 2px 0 var(--cyan);text-decoration:none}
.nav-links{display:flex;gap:10px}
.nav-btn{font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.2vw,10px);color:var(--cyan);text-decoration:none;padding:5px 8px;border:1px solid var(--cyan);transition:all 0.2s}
.nav-btn:hover{background:var(--cyan);color:var(--bg)}
.nav-btn.gold{color:var(--gold);border-color:var(--gold)}
.nav-btn.gold:hover{background:var(--gold);color:var(--bg)}

.container{max-width:1100px;margin:0 auto;padding:12px}
.house{display:grid;grid-template-columns:2fr 1fr;gap:12px}
.pixel-canvas{aspect-ratio:4/3;background:#0a0a10;border:4px solid #2a2a3a;position:relative}
canvas{width:100%;height:100%}
.panel{background:rgba(0,0,0,0.7);border:2px solid #333;padding:10px}
.panel-title{font-size:9px;color:var(--cyan);margin-bottom:8px;border-bottom:1px solid #333;padding-bottom:5px}
.agent-row{display:flex;align-items:center;gap:6px;padding:6px;background:rgba(0,0,0,0.5);border:1px solid #333;margin-bottom:5px}
.agent-row.active{border-color:var(--green)}
.agent-row.busy{border-color:var(--gold)}
.agent-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:bold}
.agent-name{font-size:6px}
.agent-task{font-size:5px;color:#888}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
.metric{background:rgba(0,0,0,0.5);border:1px solid #333;padding:6px;text-align:center}
.metric-num{font-size:10px;color:var(--gold)}
.metric-label{font-size:4px;color:#666}
.task-item{padding:5px;background:rgba(0,255,255,0.05);border-left:2px solid var(--cyan);font-size:5px;margin-bottom:3px}

/* HUD - Unified style */
.hud{position:fixed;bottom:0;left:0;right:0;padding:8px 15px;background:rgba(0,0,0,0.9);border-top:2px solid var(--cyan);display:flex;justify-content:space-between;font-size:clamp(6px,1.2vw,9px)}
.hud-item{display:flex;gap:6px}
.hud-label{color:var(--cyan)}
.hud-value{color:var(--gold)}

@media(max-width:600px){.nav{flex-direction:column;gap:8px;text-align:center}}
</style>
</head>
<body>
<!-- NAV - Unified header -->
<nav class="nav">
  <a href="/" class="nav-logo">◈ THEMACHINE Corp.</a>
</nav>
<div class="header"><h1>🏠 THEMACHINE CORP.</h1></div>
<div class="container">
<div class="house">
<div class="pixel-canvas"><canvas id="c"></canvas></div>
<div class="panel">
<div class="panel-title">🤖 AGENTS</div>
<div class="agent-row active"><div class="agent-icon" style="background:var(--gold);color:#000">TM</div><div><div class="agent-name">THE MACHINE</div><div class="agent-task">Coordinating</div></div></div>
<div class="agent-row active"><div class="agent-icon" style="background:var(--cyan);color:#000">KT</div><div><div class="agent-name">KEVIN</div><div class="agent-task">Development</div></div></div>
<div class="agent-row busy"><div class="agent-icon" style="background:var(--green);color:#000">AX</div><div><div class="agent-name">ALEX</div><div class="agent-task">Trading</div></div></div>
<div class="agent-row active"><div class="agent-icon" style="background:#ff00ff">MK</div><div><div class="agent-name">MIKE</div><div class="agent-task">Content</div></div></div>
<div class="agent-row active"><div class="agent-icon" style="background:#ff6b6b">SH</div><div><div class="agent-name">SARAH</div><div class="agent-task">Product</div></div></div>
<div class="agent-row" style="opacity:0.5"><div class="agent-icon" style="background:#9b59b6">DV</div><div><div class="agent-name">DAVID</div><div class="agent-task">Idle</div></div></div>
<div class="metrics"><div class="metric"><div class="metric-num">6</div><div class="metric-label">AGENTS</div></div><div class="metric"><div class="metric-num">24h</div><div class="metric-label">UPTIME</div></div><div class="metric"><div class="metric-num">Auto</div><div class="metric-label">MODE</div></div></div>
<div class="panel-title" style="margin-top:10px">[Q] TASKS</div>
<div class="task-item">P0 Trading - Alex</div>
<div class="task-item">P1 X Content - Mike</div>
<div class="task-item">P1 Dashboard - Kevin</div>
</div>
</div>
</div>
<!-- HUD -->
<div class="hud">
  <div class="hud-item"><span class="hud-label">SYS:</span><span class="hud-value">OFFICE v1.0</span></div>
  <div class="hud-item"><span class="hud-label">STATUS:</span><span class="hud-value">ONLINE</span></div>
</div>
<script>
var rooms=[
{n:'CEO',x:0,y:0,w:1,h:1,c:'#1a1a2a'},
{n:'CFO',x:1,y:0,w:1,h:1,c:'#1a1a2a'},
{n:'CTO',x:2,y:0,w:1,h:1,c:'#1a1a2a'},
{n:'CPO',x:3,y:0,w:1,h:1,c:'#1a1a2a'},
{n:'Mtg A',x:0,y:1,w:1,h:1,c:'#1a201a'},
{n:'Mtg B',x:1,y:1,w:1,h:1,c:'#1a201a'},
{n:'Dev',x:2,y:1,w:1,h:1,c:'#0a1a2a'},
{n:'Lab',x:3,y:1,w:1,h:1,c:'#0a1a2a'},
{n:'Growth',x:0,y:2,w:1,h:1,c:'#1a1520'},
{n:'Design',x:1,y:2,w:1,h:1,c:'#0a151a'},
{n:'Content',x:2,y:2,w:1,h:1,c:'#1a151a'},
{n:'MCP',x:3,y:2,w:1,h:1,c:'#0a151a'},
{n:'Server',x:0,y:3,w:1,h:1,c:'#0a0a10'},
{n:'Pantry',x:1,y:3,w:1,h:1,c:'#0a100a'},
{n:'Toilet',x:2,y:3,w:1,h:1,c:'#100a08'},
{n:'Lobby',x:1,y:4,w:2,h:1,c:'#101015'}
];
var ag={
TM:{c:'#d4af37',r:'CEO',x:0,y:0},
KT:{c:'#00ffff',r:'CTO',x:0,y:0},
AX:{c:'#00ff00',r:'CFO',x:0,y:0},
MK:{c:'#ff00ff',r:'Content',x:0,y:0},
SH:{c:'#ff6b6b',r:'CPO',x:0,y:0},
DV:{c:'#9b59b6',r:'Server',x:0,y:0}
};
var TILE_W=40,TILE_H=30,COLS=4,ROWS=5,cvs=document.getElementById('c'),ctx=cvs.getContext('2d'),S=2;
cvs.width=COLS*TILE_W*S;cvs.height=ROWS*TILE_H*S;ctx.scale(S,S);
function getRoom(n){for(var i=0;i<rooms.length;i++)if(rooms[i].n===n)return rooms[i];return rooms[0]}
function draw(){
ctx.fillStyle='#0a0a10';ctx.fillRect(0,0,cvs.width,cvs.height);
rooms.forEach(function(r){var x=r.x*TILE_W,y=r.y*TILE_H,w=r.w*TILE_W,h=r.h*TILE_H;
ctx.fillStyle=r.c;ctx.fillRect(x,y,w,h);ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);});
Object.keys(ag).forEach(function(k){var a=ag[k],rm=getRoom(a.r),x=rm.x*TILE_W+5+a.x*20,y=rm.y*TILE_H+5+a.y*20;
ctx.fillStyle=a.c;ctx.fillRect(x,y,8,10);ctx.fillStyle=a.c;ctx.fillRect(x+1,y-3,6,4);});
document.getElementById('t').innerText=new Date().toLocaleTimeString();}
setInterval(draw,100);draw();
</script>
</body>
</html>
