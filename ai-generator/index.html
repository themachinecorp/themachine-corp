<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 图像生成</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 600px; }
        h1 { text-align: center; margin-bottom: 40px; font-size: 32px; background: linear-gradient(90deg, #00d4ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-box { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        textarea { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 16px; min-height: 120px; resize: none; font-family: inherit; }
        textarea:focus { outline: none; border-color: #00d4ff; }
        textarea::placeholder { color: rgba(255,255,255,0.4); }
        .settings { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        select, .btn { padding: 12px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; cursor: pointer; }
        select { flex: 1; min-width: 150px; }
        .btn { background: linear-gradient(135deg, #00d4ff, #7b2ff7); border: none; font-weight: 600; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,255,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Progress bar */
        .progress-container { display: none; margin-top: 20px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #7b2ff7); width: 0%; transition: width 0.5s; }
        .progress-text { text-align: center; margin-top: 10px; font-size: 14px; color: #00d4ff; }
        
        #result { margin-top: 24px; text-align: center; display: none; }
        #result img { max-width: 100%; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        #status { margin-top: 16px; padding: 12px; border-radius: 8px; text-align: center; display: none; font-size: 14px; }
        .loading { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .error { background: rgba(248,113,113,0.2); color: #f87171; }
        .success { background: rgba(74,222,128,0.2); color: #4ade80; }
        
        .tips { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ AI 图像生成</h1>
        
        <div class="input-box">
            <textarea id="prompt" placeholder="描述你想要的图像...&#10;例如：一只可爱的猫咪在阳光下玩耍"></textarea>
            
            <div class="settings">
                <select id="model">
                    <option value="majicmixRealistic_v7.safetensors">🎨 majicMIX v7 (写实)</option>
                    <option value="majicflus_v10.safetensors">🌟 majicFlus v1.0</option>
                </select>
                <button class="btn" onclick="generate()" id="generateBtn">立即生成</button>
            </div>
            
            <div id="status"></div>
            
            <!-- Progress -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">正在生成...</div>
            </div>
        </div>
        
        <div id="result">
            <img id="resultImg" alt="生成结果">
        </div>
        
        <div class="tips">视频模型下载中...</div>
    </div>

    <script>
        let promptId = null;
        let checkInterval = null;
        
        function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            const model = document.getElementById('model').value;
            
            if (!prompt) {
                showStatus('请输入描述文字', 'error');
                return;
            }
            
            showProgress('正在启动生成任务...', 0);
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('result').style.display = 'none';
            
            const workflow = {
                prompt: {
                    "3": { inputs: { text: prompt, clip: ["4", 0] }, class_type: "CLIPTextEncode" },
                    "4": { inputs: { text: "low quality, blurry, distorted, deformed, bad anatomy", clip: ["4", 0] }, class_type: "CLIPTextEncode" },
                    "5": { 
                        inputs: { 
                            seed: Math.floor(Math.random() * 1000000000), 
                            steps: 25, 
                            cfg: 7, 
                            sampler_name: "euler", 
                            scheduler: "normal", 
                            positive: ["3", 0], 
                            negative: ["4", 0], 
                            model: ["6", 0], 
                            latent: ["8", 0], 
                            denoise: 1 
                        }, 
                        class_type: "KSampler" 
                    },
                    "6": { inputs: { ckpt_name: model }, class_type: "CheckpointLoaderSimple" },
                    "8": { inputs: { width: 512, height: 768, batch_size: 1 }, class_type: "EmptyLatentImage" },
                    "10": { inputs: { samples: ["5", 0], vae: ["6", 2] }, class_type: "VAEDecode" },
                    "11": { inputs: { images: ["10", 0], filename_prefix: "output" }, class_type: "SaveImage" }
                }
            };
            
            fetch('/prompt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(workflow)
            })
            .then(res => res.json())
            .then(data => {
                promptId = data.prompt_id;
                showProgress('正在生成中 (25步)...', 10);
                checkStatus();
            })
            .catch(e => {
                showStatus('连接失败: ' + e.message, 'error');
                document.getElementById('generateBtn').disabled = false;
                hideProgress();
            });
        }
        
        function checkStatus() {
            if (!promptId) return;
            
            fetch('/history/' + promptId)
            .then(res => res.json())
            .then(data => {
                const result = data[promptId];
                if (result) {
                    // Check status
                    const status = result.status;
                    if (status && status.exec_info) {
                        const progress = status.exec_info.progress || 0;
                        const percent = Math.round(progress * 100);
                        showProgress(`生成中... ${percent}%`, Math.min(percent + 10, 90));
                    }
                    
                    // Check outputs
                    const outputs = result.outputs;
                    for (const nodeId in outputs) {
                        const node = outputs[nodeId];
                        if (node.images) {
                            const img = node.images[0];
                            document.getElementById('resultImg').src = '/view?filename=' + img.filename + '&type=output';
                            document.getElementById('result').style.display = 'block';
                            showProgress('✨ 生成完成！', 100);
                            document.getElementById('generateBtn').disabled = false;
                            if (checkInterval) clearInterval(checkInterval);
                            return;
                        }
                    }
                }
                // Continue checking
                checkInterval = setTimeout(checkStatus, 2000);
            })
            .catch(e => {
                showStatus('检查失败: ' + e.message, 'error');
                document.getElementById('generateBtn').disabled = false;
                hideProgress();
            });
        }
        
        function showProgress(text, percent) {
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('progressText').textContent = text;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('status').style.display = 'none';
        }
        
        function hideProgress() {
            document.getElementById('progressContainer').style.display = 'none';
        }
        
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
            document.getElementById('progressContainer').style.display = 'none';
        }
        
        // Ctrl+Enter to generate
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) generate();
        });
    </script>
</body>
</html>
