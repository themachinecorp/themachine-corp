<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/ag-theme.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demand Lab — THEMACHINE Corp.</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start 2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    a { color: inherit; text-decoration: none; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 8px;
    }
    nav .logo { font-family: 'Press Start 2P', cursive; font-size: 9px; color: var(--cyan); text-decoration: none; }
    nav .logo span { color: var(--gold); }
    nav .nav-links { display: flex; gap: 20px; list-style: none; }
    nav .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 11px; }
    nav .nav-links a:hover { color: var(--text); }
    nav .nav-links a.active { color: var(--gold); }

    .container { max-width: 960px; margin: 0 auto; padding: 0 20px 80px; }

    .page-header { text-align: center; padding: 60px 24px 40px; }
    .page-header h1 { font-family: 'Press Start 2P', cursive; font-size: clamp(12px,2.5vw,18px); color: var(--text); margin-bottom: 14px; line-height: 1.5; }
    .page-header p { color: var(--text-dim); font-size: clamp(11px,1.8vw,14px); max-width: 560px; margin: 0 auto; }

    .section-label { font-family: 'Press Start 2P', cursive; font-size: clamp(9px,1.5vw,13px); color: var(--cyan); text-align: center; letter-spacing: 2px; margin-bottom: 8px; }
    .section-divider { width: 48px; height: 2px; background: linear-gradient(90deg, var(--gold), var(--cyan)); margin: 0 auto 12px; }
    .section-sub { text-align: center; color: var(--text-dim); font-size: clamp(11px,1.8vw,14px); margin-bottom: 40px; }

    /* STATUS BADGES */
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 3px; font-size: 9px;
      font-family: 'Press Start 2P', cursive; letter-spacing: 1px;
    }
    .status-shipped { background: rgba(34,197,94,.15); color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
    .status-in_dev { background: rgba(234,179,8,.15); color: var(--gold); border: 1px solid rgba(234,179,8,.3); }
    .status-ready { background: rgba(34,211,238,.15); color: var(--cyan); border: 1px solid rgba(34,211,238,.3); }
    .status-idea { background: rgba(148,163,184,.1); color: var(--text-dim); border: 1px solid var(--border2); }
    .status-analyzing { background: rgba(168,85,247,.1); color: #a855f7; border: 1px solid rgba(168,85,247,.3); }

    /* PIPELINE FLOW */
    .pipeline-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 40px; flex-wrap: wrap;
    }
    .pipeline-step {
      padding: 6px 14px; font-size: 10px; font-family: 'Press Start 2P', cursive;
      color: var(--text-dim); background: var(--surface); border: 1px solid var(--border2);
    }
    .pipeline-step.active { color: var(--cyan); border-color: var(--cyan); }
    .pipeline-arrow { color: var(--border2); font-size: 14px; padding: 0 4px; }

    /* PROJECT GRID */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .project-card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 6px; padding: 20px; transition: border-color .2s;
    }
    .project-card:hover { border-color: var(--cyan); }
    .project-card.in_dev { border-color: rgba(234,179,8,.3); }

    .project-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
    .project-title { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.4; }
    .project-desc { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 14px; }

    .project-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .meta-chip { font-size: 9px; padding: 2px 8px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border2); color: var(--text-dim); }
    .meta-chip.cat-product { border-color: rgba(168,85,247,.4); color: #a855f7; }
    .meta-chip.cat-tools { border-color: rgba(34,211,238,.4); color: var(--cyan); }

    .project-link { display: inline-block; font-size: 11px; color: var(--cyan); font-family: 'Press Start 2P', cursive; }
    .project-link:hover { color: var(--gold); }

    /* PROGRESS BAR */
    .progress-wrap { margin-top: 12px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-dim); margin-bottom: 4px; }
    .progress-bar { height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .6s ease; }
    .progress-fill.done { background: #22c55e; }

    .footer { text-align: center; padding: 24px; font-size: 10px; color: var(--text-dim); border-top: 1px solid var(--border2); margin-top: 40px; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">◈ THEMACHINE<span>.</span></a>
    <ul class="nav-links">
      <li><a href="/demo/">Demo</a></li>
      <li><a href="/demand-lab/" class="active">Demand Lab</a></li>
      <li><a href="/">Home</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="page-header">
      <div class="section-label">DEMAND LAB</div>
      <div class="section-divider"></div>
      <h1>What We're Building</h1>
      <p>AI agent products and tools — shipped, in progress, and on the roadmap. Real demand, real execution.</p>
    </div>

    <!-- PIPELINE FLOW -->
    <div style="text-align:center;margin-bottom:32px;">
      <div class="pipeline-bar">
        <div class="pipeline-step">💡 Idea</div>
        <div class="pipeline-arrow">→</div>
        <div class="pipeline-step">🔍 Validating</div>
        <div class="pipeline-arrow">→</div>
        <div class="pipeline-step">🔥 In Dev</div>
        <div class="pipeline-arrow">→</div>
        <div class="pipeline-step active">🚀 Shipped</div>
      </div>
    </div>

    <!-- PROJECTS GRID -->
    <div class="projects-grid" id="projects-grid">
      <div style="color:var(--text-dim);text-align:center;padding:60px;font-size:12px;">Loading...</div>
    </div>
  </div>

  <div class="footer">
    THEMACHINE Corp. · <a href="/" style="color:var(--cyan)">themachine-corp.pages.dev</a>
  </div>

  <script>
    const STATUS_LABELS = {
      shipped: '🚀 Shipped',
      in_dev: '🔥 In Dev',
      ready: '✅ Ready',
      idea: '💡 Idea',
      analyzing: '🔍 Validating'
    };

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function progressClass(status, progress) {
      if (status === 'shipped') return 'done';
      if (progress > 60) return '';
      return '';
    }

    fetch('/demand-lab/demand-cards.json')
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('projects-grid');
        const cards = data.cards || [];

        if (!cards.length) {
          grid.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:60px;font-size:12px">Nothing here yet.</p>';
          return;
        }

        grid.innerHTML = cards.map(card => {
          const isInDev = card.status === 'in_dev';
          const statusHtml = STATUS_LABELS[card.status] || card.status;
          const catLabel = { product: '🛒 Product', tools: '🔧 Tools' }[card.category] || '📌';
          const pclass = progressClass(card.status, card.progress);

          return `<div class="project-card${isInDev ? ' in_dev' : ''}">
            <div class="project-top">
              <div class="project-title">${esc(card.title)}</div>
            </div>
            <div class="project-meta">
              <span class="status-badge status-${card.status}">${statusHtml}</span>
              <span class="meta-chip cat-${card.category}">${catLabel}</span>
            </div>
            <div class="project-desc">${esc(card.description)}</div>
            ${card.url ? `<a href="${esc(card.url)}" class="project-link" target="_blank">View Project ↗</a>` : ''}
            ${card.status !== 'idea' && card.status !== 'analyzing' ? `
            <div class="progress-wrap">
              <div class="progress-label">
                <span>${card.progress}%</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill ${pclass}" style="width:${card.progress}%"></div>
              </div>
            </div>` : ''}
          </div>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('projects-grid').innerHTML =
          '<p style="color:var(--text-dim);text-align:center;padding:60px;font-size:12px">Failed to load projects.</p>';
      });
  </script>
</body>
</html>
