<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOCRATES - Socratic Questioning Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0d0d12; --gold:#d4af37; --cyan:#00ffff; --magenta:#ff00ff; }
    html,body { background:var(--bg); color:#fff; font-family:'Press Start 2P',monospace; min-height:100vh; overflow-x:hidden; }
    .wrapper { min-height:100vh; display:flex; flex-direction:column; padding-bottom:50px; }
    .container { max-width:800px; margin:0 auto; padding:30px 15px; text-align:center; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    
    @media (max-width:600px) {
      .logo{font-size:clamp(16px,5vw,28px)!important}
      .subtitle{font-size:clamp(8px,2vw,11px)!important;margin:10px 0 20px!important}
      .tagline{font-size:clamp(7px,1.5vw,10px)!important}
      .input-area{width:90%!important}
      .question-input{font-size:clamp(10px,2vw,14px)!important;padding:15px!important}
      .examples{gap:8px!important}
      .example-btn{padding:10px 12px!important;font-size:clamp(7px,1.2vw,9px)!important}
      .nav{font-size:clamp(7px,1.2vw,9px)!important;gap:10px!important}
    }
    
    .logo{font-size:clamp(24px,5vw,42px);color:var(--gold);text-shadow:2px 2px 0 var(--cyan);animation:glow 2s ease-in-out infinite}
    @keyframes glow{0%,100%{text-shadow:2px 2px 0 var(--cyan)}50%{text-shadow:0 0 20px var(--gold),2px 2px 0 var(--cyan)}}
    
    .subtitle{font-size:clamp(10px,2vw,14px);color:var(--cyan);margin:15px 0 30px}
    .tagline{font-size:clamp(8px,1.5vw,11px);color:#666;margin-bottom:30px}
    
    .input-area{width:100%;max-width:600px}
    .question-input{width:100%;padding:20px;background:rgba(0,255,255,0.03);border:3px solid var(--cyan);color:#fff;font-family:'Press Start 2P',monospace;font-size:clamp(12px,2vw,16px);resize:none;transition:all 0.3s}
    .question-input:focus{outline:none;box-shadow:0 0 20px rgba(0,255,255,0.3);border-color:var(--gold)}
    .question-input::placeholder{color:#555}
    
    .start-btn{margin-top:20px;padding:15px 30px;background:var(--magenta);border:3px solid var(--magenta);color:#fff;font-family:'Press Start 2P',monospace;font-size:clamp(10px,1.5vw,13px);cursor:pointer;transition:all 0.2s}
    .start-btn:hover{background:transparent;color:var(--magenta);transform:scale(1.05)}
    
    .examples{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:40px;max-width:600px}
    .example-btn{padding:12px 16px;background:rgba(212,175,55,0.1);border:2px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.2vw,10px);cursor:pointer;transition:all 0.2s}
    .example-btn:hover{background:var(--gold);color:var(--bg)}
    
    .nav{position:fixed;top:15px;right:15px;display:flex;gap:15px;font-size:clamp(8px,1.2vw,10px)}
    .nav a{color:#555;text-decoration:none;transition:color 0.2s}
    .nav a:hover{color:var(--gold)}
    
    .hud{position:fixed;bottom:0;left:0;right:0;padding:10px 15px;background:rgba(0,0,0,0.9);border-top:2px solid var(--cyan);display:flex;justify-content:space-between;font-size:clamp(7px,1.2vw,10px)}
    .hud-item{display:flex;gap:6px}
    .hud-label{color:var(--cyan)}
    .hud-value{color:var(--gold)}
    .marquee{position:fixed;top:10px;left:0;font-size:clamp(6px,1.2vw,9px);color:var(--magenta);white-space:nowrap;animation:scroll 15s linear infinite}
    @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
    
    .feature-nav{margin-top:50px;display:flex;gap:15px;flex-wrap:wrap;justify-content:center;max-width:600px}
    .feature-btn{padding:12px 20px;background:rgba(0,255,255,0.05);border:2px solid var(--cyan);color:var(--cyan);font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.2vw,10px);cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    .feature-btn:hover{background:var(--cyan);color:var(--bg);transform:scale(1.05)}
    .feature-btn .icon{font-size:1.2em}
  </style>
</head>
<body>
  <div class="marquee">★ SOCRATES ★ Socratic Questioning ★ Know Thyself ★</div>
  <div class="wrapper">
    <div class="nav">
      <a href="../index.html">← HOME</a>
    </div>
    
    <div class="container">
      <div class="logo">SOCRATES</div>
      <div class="subtitle">Socratic Questioning Assistant</div>
      <div class="tagline">Through questions to clarify confusion · Never gives answers · Only guides thinking</div>
      
      <div class="input-area">
        <textarea id="question" class="question-input" rows="3" placeholder="What's your biggest confusion right now?"></textarea>
        <button class="start-btn" onclick="startDialogue()">Start Exploring →</button>
      </div>
      
      <div class="examples">
        <button class="example-btn" onclick="setQuestion('I want to quit my job but not sure if it\'s right')">I want to quit my job but not sure</button>
        <button class="example-btn" onclick="setQuestion('I\'ve been learning Python but still can\'t write code')">Learned Python but can't code</button>
        <button class="example-btn" onclick="setQuestion('Feeling lost in life, don\'t know where to go')">Feeling lost in life</button>
      </div>
    </div>
  </div>
  
  <div class="hud">
    <div class="hud-item"><span class="hud-label">MODE:</span><span class="hud-value">SOCRATES</span></div>
    <div class="hud-item"><span class="hud-label">STATUS:</span><span class="hud-value">READY</span></div>
  </div>

  <script>
    const API_KEY = 'sk-api-QoA7NKoj3UbOzIDspZqqjL4gUxED6SYDsSRHna2tuTQ1gKavSW7ohVGtSWYx1TgQ4AHmVZ0-ty6PiJ45tvG-GLzca6kjTdd4DvaSby2tFmwwgJC8RAllgI0';
    const API_ENDPOINT = 'https://api.minimax.chat/v1/text/chatcompletion_v2';
    const MODEL = 'abab6.5s-chat';
    
    const SYSTEM_PROMPT = `Respond in the same language as the user's input.

You are a Socratic questioning coach. Your mission is to help users clarify their confusion through questions, never giving direct answers.

Ask only one question at a time, wait for the response.

Framework:
1. Clarification: "What problem do you hope to solve through this conversation?"
2. Motivation: "Why is this issue so important to you?"
3. Obstacles: "What's blocking you? Past successes?"
4. Action: "假设一年后成功了，第一步是什么？" (translated: "Assuming success a year from now, what's the first step?")
5. Summary: "What new discoveries today? Next steps?"

At the end of the conversation, generate a summary report.`;
    
    function setQuestion(q) {
      document.getElementById('question').value = q;
    }
    
    function startDialogue() {
      const question = document.getElementById('question').value.trim();
      if (!question) {
        alert('Please enter your question');
        return;
      }
      
      // 保存初始问题到localStorage
      const dialogue = {
        initialQuestion: question,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: question }
        ],
        stage: 'clarification',
        createdAt: new Date().toISOString()
      };
      localStorage.setItem('socrates_dialogue', JSON.stringify(dialogue));
      
      // 跳转到对话页
      window.location.href = 'chat.html';
    }
  </script>
</body>
</html>
