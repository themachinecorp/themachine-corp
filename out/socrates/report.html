<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOCRATES - Thinking Report</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0d0d12; --gold:#d4af37; --cyan:#00ffff; --magenta:#ff00ff; }
    html,body { background:var(--bg); color:#fff; font-family:'Press Start 2P',monospace; min-height:100vh; overflow-x:hidden; }
    .wrapper { min-height:100vh; display:flex; flex-direction:column; }
    
    @media (max-width:600px) {
      .header{font-size:clamp(10px,2vw,14px)!important;padding:10px!important}
      .container{padding:15px!important}
      .report-title{font-size:clamp(14px,3vw,22px)!important;margin-bottom:20px!important}
      .section{padding:15px!important;margin-bottom:15px!important}
      .section-title{font-size:clamp(11px,2vw,15px)!important;margin-bottom:12px!important}
      .section-content{font-size:clamp(9px,1.5vw,12px)!important;line-height:1.8!important}
      .action-btn{padding:12px 20px!important;font-size:clamp(9px,1.5vw,11px)!important}
    }
    
    .nav{display:flex;align-items:center;padding:15px 20px;border-bottom:2px solid var(--cyan);background:rgba(0,0,0,0.8);position:sticky;top:0;z-index:100}
    .nav-logo{font-size:clamp(12px,2vw,16px);color:var(--gold);text-shadow:2px 2px 0 var(--cyan);text-decoration:none}
    
    .container{max-width:800px;margin:0 auto;padding:30px 20px;width:100%}
    .report-title{font-size:clamp(18px,3vw,28px);color:var(--gold);text-align:center;margin-bottom:30px;text-shadow:2px 2px 0 var(--cyan)}
    
    .section{background:rgba(0,255,255,0.03);border:2px solid var(--cyan);padding:20px;margin-bottom:20px}
    .section.gold{border-color:var(--gold);background:rgba(212,175,55,0.03)}
    .section.magenta{border-color:var(--magenta);background:rgba(255,0,255,0.03)}
    
    .section-title{font-size:clamp(12px,2vw,16px);color:var(--cyan);margin-bottom:15px;display:flex;align-items:center;gap:10px}
    .section.gold .section-title{color:var(--gold)}
    .section.magenta .section-title{color:var(--magenta)}
    
    .section-icon{font-size:1.2em}
    
    .section-content{font-size:clamp(10px,1.5vw,13px);line-height:2;word-wrap:break-word}
    
    .dialogue-history{background:rgba(0,0,0,0.3);border:1px solid #333;padding:15px;margin-top:15px;max-height:300px;overflow-y:auto}
    .dialogue-item{padding:10px 0;border-bottom:1px solid #222;font-size:clamp(8px,1.2vw,10px);line-height:1.8}
    .dialogue-item:last-child{border-bottom:none}
    .dialogue-role{color:var(--gold);margin-bottom:5px}
    .dialogue-role.ai{color:var(--magenta)}
    
    .actions{display:flex;gap:15px;justify-content:center;margin-top:30px;flex-wrap:wrap}
    .action-btn{padding:15px 30px;background:transparent;border:2px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:clamp(10px,1.5vw,12px);cursor:pointer;transition:all 0.2s;text-decoration:none}
    .action-btn:hover{background:var(--gold);color:var(--bg)}
    .action-btn.cyan{border-color:var(--cyan);color:var(--cyan)}
    .action-btn.cyan:hover{background:var(--cyan)}
    
    .timestamp{text-align:center;color:#555;font-size:clamp(8px,1.2vw,10px);margin-top:20px}
    
    .empty-state{text-align:center;padding:50px 20px;color:#666}
    .empty-state .icon{font-size:50px;margin-bottom:20px}
    
    .hud{position:fixed;bottom:0;left:0;right:0;padding:10px 15px;background:rgba(0,0,0,0.9);border-top:2px solid var(--cyan);display:flex;justify-content:space-between;font-size:clamp(7px,1.2vw,10px)}
    .hud-item{display:flex;gap:6px}
    .hud-label{color:var(--cyan)}
    .hud-value{color:var(--gold)}
  </style>
</head>
<body>
  <nav class="nav"><a href="/" class="nav-logo">◈ THEMACHINE Corp.</a></nav>
  
  <div class="container" id="report">
    <!-- 报告内容 -->
  </div>
  
  <!-- HUD -->
  <div class="hud">
    <div class="hud-item"><span class="hud-label">SYS:</span><span class="hud-value">REPORT v1.0</span></div>
    <div class="hud-item"><span class="hud-label">STATUS:</span><span class="hud-value">ONLINE</span></div>
  </div>

  <script>
    async function generateReport() {
      // Paid access check
      if (localStorage.getItem('socrates_paid') !== '1') {
        window.location.href = 'access.html';
        return;
      }

      const stored = localStorage.getItem('socrates_report_data');
      if (!stored) {
        renderEmpty();
        return;
      }
      
      const dialogue = JSON.parse(stored);
      const reportContainer = document.getElementById('report');
      
      // 使用AI生成报告
      const report = await createReport(dialogue);
      
      renderReport(dialogue, report);
    }
    
    async function createReport(dialogue) {
      // Language detection
      const lang = /[\u4e00-\u9fff]/.test(dialogue.initialQuestion || '') ? 'zh' : 'en';
      
      const userMessages = dialogue.messages.filter(m => m.role === 'user').map(m => m.content);
      const aiMessages = dialogue.messages.filter(m => m.role === 'assistant').map(m => m.content);
      
      const historyText = userMessages.map((u, i) =>
        `User: ${u}\nSocrates: ${aiMessages[i] || ''}`
      ).join('\n\n');
      
      const systemPrompt = lang === 'zh'
        ? `你是一位苏格拉底式思维教练。你将根据对话生成一份个人思维报告。
严格遵循以下格式输出4个部分，用中文输出，不要偏离格式：
## 🎯 核心问题
[一句话切入问题核心]
## ⚡ 关键矛盾
[用户思维中隐藏的核心矛盾或假设]
## 💎 内在资源
[用户可以调用的优势、价值观或过往经验]
## 🚀 下一步行动
[一个具体且可立即执行的行动]`
        : `You are a Socratic thinking coach. Generate a concise personal thinking report based on the dialogue.
Follow this exact format — output ONLY these 4 sections:
## 🎯 Core Problem
[One sentence cutting to the heart of the matter]
## ⚡ Key Contradiction
[The central tension or hidden assumption in their thinking]
## 💎 Hidden Resources
[Strengths, values, or prior experiences they can draw on]
## 🚀 Next Step
[One specific, immediate action they can take]`;
      
      const userPrompt = lang === 'zh'
        ? `用户初始困惑：${dialogue.initialQuestion}\n\n对话历史：\n${historyText}`
        : `User's opening question: ${dialogue.initialQuestion}\n\nDialogue history:\n${historyText}`;
      
      const key = (() => { try { return atob('c2stYXBpLVFvQTdOS29qM1ViT3pJRHNwWnFxakw0Z1V4RUQ2U1lEc1NSSG5hMnR1VFExZ0thdlNXN29oVkd0U1dZeDFUZ1E0QUhtVlowLXR5NlBpSjQ1dHZHLUdMemNhNmtqVGRkNER2YVNieTJ0Rm13d2dKQzhSQWxsZ0kwCg=='); } catch(e) { return null; } })();
      
      if (!key) {
        return lang === 'zh'
          ? 'API未配置，无法生成报告。'
          : 'API not configured. Cannot generate report.';
      }
      
      try {
        const response = await fetch('https://api.minimax.chat/v1/text/chatcompletion_v2', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + key
          },
          body: JSON.stringify({
            model: 'abab6.5s-chat',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt }
            ],
            temperature: 0.6,
            max_tokens: 1200
          })
        });
        
        const data = await response.json();
        if (data.choices && data.choices[0]) {
          return data.choices[0].message.content;
        }
        if (data.error && data.error.message) {
          return lang === 'zh'
            ? '报告生成失败: ' + data.error.message
            : 'Report generation failed: ' + data.error.message;
        }
      } catch (err) {
        console.error('Report generation error', err);
      }
      
      // Fallback — Socratic-style default
      return lang === 'zh'
        ? `## 🎯 核心问题\n${dialogue.initialQuestion}\n\n## ⚡ 关键矛盾\n在对话中你已开始深入探索自己的困惑，这是重要的第一步。\n\n## 💎 内在资源\n你展现出了面对困惑时深入思考的勇气，这是任何改变的基础。\n\n## 🚀 下一步行动\n1. 回顾对话中你最意外的那个发现\n2. 把那个发现写下来\n3. 问自己：今天我可以迈出哪一小步？`
        : `## 🎯 Core Problem\n${dialogue.initialQuestion}\n\n## ⚡ Key Contradiction\nYou have begun exploring your confusion deeply — that is the critical first step.\n\n## 💎 Hidden Resources\nYour willingness to sit with discomfort and question yourself is the foundation of any real change.\n\n## 🚀 Next Step\n1. Review the dialogue — identify the most surprising insight you discovered\n2. Write it down\n3. Ask yourself: what is the ONE small step I can take today?`;
    }
    
    function renderReport(dialogue, report) {
      const container = document.getElementById('report');
      
      // 解析报告内容
      const sections = {
        core: '',
        contradiction: '',
        resources: '',
        action: ''
      };
      
      const lines = report.split('\n');
      let currentSection = '';
      
      lines.forEach(line => {
        // Handle both Chinese and English section headers
        if (line.includes('核心问题') || line.includes('Core Problem')) currentSection = 'core';
        else if (line.includes('关键矛盾') || line.includes('Key Contradiction')) currentSection = 'contradiction';
        else if (line.includes('内在资源') || line.includes('Hidden Resources') || line.includes('Inner Resources')) currentSection = 'resources';
        else if (line.includes('下一步行动') || line.includes('Next Step') || line.includes('Next Steps')) currentSection = 'action';
        else if (currentSection && line.trim()) {
          sections[currentSection] += line.trim() + '\n';
        }
      });
      
      // 清理内容
      Object.keys(sections).forEach(k => {
        sections[k] = sections[k].replace(/^#+ /, '').trim();
      });
      
      const date = new Date(dialogue.createdAt).toLocaleDateString('zh-CN');
      const lang = /[\u4e00-\u9fff]/.test(dialogue.initialQuestion || '') ? 'zh' : 'en';
      const labels = lang === 'zh'
        ? { title: '📊 个人思维报告', core: '核心问题', contradiction: '关键矛盾', resources: '内在资源', action: '下一步行动', dialogue: '对话回顾', restart: '重新开始', copy: '复制报告', generated: '生成时间' }
        : { title: '📊 Personal Thinking Report', core: 'Core Problem', contradiction: 'Key Contradiction', resources: 'Hidden Resources', action: 'Next Step', dialogue: 'Dialogue Review', restart: 'Start Over', copy: 'Copy Report', generated: 'Generated' };
      
      container.innerHTML = `
        <div class="report-title">${labels.title}</div>
        
        <div class="section">
          <div class="section-title"><span class="section-icon">🎯</span> ${labels.core}</div>
          <div class="section-content">${sections.core || dialogue.initialQuestion}</div>
        </div>
        
        <div class="section gold">
          <div class="section-title"><span class="section-icon">⚡</span> ${labels.contradiction}</div>
          <div class="section-content">${sections.contradiction || (lang === 'zh' ? '在探索中...' : 'Still exploring...')}</div>
        </div>
        
        <div class="section">
          <div class="section-title"><span class="section-icon">💎</span> ${labels.resources}</div>
          <div class="section-content">${sections.resources || (lang === 'zh' ? '等待发现...' : 'Waiting to be discovered...')}</div>
        </div>
        
        <div class="section magenta">
          <div class="section-title"><span class="section-icon">🚀</span> ${labels.action}</div>
          <div class="section-content">${sections.action || (lang === 'zh' ? '开始行动吧！' : 'Time to take action!')}</div>
        </div>
        
        <div class="section">
          <div class="section-title"><span class="section-icon">💬</span> ${labels.dialogue}</div>
          <div class="dialogue-history">
            ${dialogue.messages.filter(m => m.role !== 'system').map(m => `
              <div class="dialogue-item">
                <div class="dialogue-role ${m.role === 'assistant' ? 'ai' : ''}">${m.role === 'assistant' ? '◈ SOCRATES' : '▸ You'}</div>
                <div>${m.content}</div>
              </div>
            `).join('')}
          </div>
        </div>
        
        <div class="actions">
          <button class="action-btn" onclick="downloadPDF()">⬇️ 下载PDF</button>
          <button class="action-btn cyan" onclick="copyReport()">${labels.copy}</button>
          <a href="index.html" class="action-btn">${labels.restart}</a>
        </div>
        
        <div class="timestamp">${labels.generated}: ${date}</div>
      `;
    }
    
    function renderEmpty() {
      document.getElementById('report').innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <div>暂无报告数据</div>
          <a href="index.html" class="action-btn" style="display:inline-block;margin-top:20px">开始对话</a>
        </div>
      `;
    }
    
    function copyReport() {
      const container = document.getElementById('report');
      const text = container.innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert('报告已复制到剪贴板！');
      });
    }
    
    // 初始化
    generateReport();

    // 关闭页面时提示
    window.addEventListener('beforeunload', function(e) {
      e.preventDefault();
      e.returnValue = '关闭页面后报告结果将会丢失，请确认已保存结果。';
    });

    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const container = document.getElementById('report');
      
      // Title
      doc.setFontSize(20);
      doc.setTextColor(212, 175, 55);
      doc.text('SOCRATES Thinking Report', 105, 20, { align: 'center' });
      doc.setDrawColor(0, 255, 255);
      doc.line(20, 25, 190, 25);
      
      doc.setFontSize(10);
      doc.setTextColor(200);
      doc.text(new Date().toLocaleDateString('zh-CN'), 105, 32, { align: 'center' });
      
      let y = 45;
      const sections = container.querySelectorAll('.section');
      sections.forEach(section => {
        const title = section.querySelector('.section-title');
        const body = section.querySelector('.section-content');
        if (title && body) {
          doc.setFontSize(12);
          doc.setTextColor(0, 200, 200);
          doc.text(title.innerText, 20, y);
          y += 8;
          doc.setFontSize(10);
          doc.setTextColor(255, 255, 255);
          const lines = doc.splitTextToSize(body.innerText, 170);
          doc.text(lines, 20, y);
          y += lines.length * 6 + 10;
        }
      });
      
      doc.save('socrates-report.pdf');
    }
  </script>
</body>
</html>
