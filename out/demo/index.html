<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/ag-theme.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo | THEMACHINE Corp.</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; line-height: 1.6; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
    nav .logo { font-family: 'Press Start 2P', cursive; font-size: clamp(8px,1.5vw,12px); color: var(--cyan); text-decoration: none; white-space: nowrap; }
    nav .logo span { color: var(--gold); }
    nav .nav-links { display: flex; gap: 20px; list-style: none; flex-wrap: wrap; }
    nav .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 12px; transition: color .2s; }
    nav .nav-links a:hover { color: var(--text); }
    nav .nav-links a.active { color: var(--gold); }

    .page-header { text-align: center; padding: 60px 24px 40px; }
    .page-header h1 { font-family: 'Press Start 2P', cursive; font-size: clamp(12px,2.5vw,22px); color: var(--text); margin-bottom: 14px; line-height: 1.5; }
    .page-header p { color: var(--text-dim); font-size: clamp(12px,1.8vw,15px); }

    .container { max-width: 960px; margin: 0 auto; padding: 0 24px 80px; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 28px 24px; display: flex; flex-direction: column; gap: 16px; transition: border-color .3s, transform .3s; }
    .card:hover { border-color: rgba(0,229,255,.4); transform: translateY(-2px); }
    .card.in_dev { border-color: rgba(234,179,8,.3); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-title { font-family: 'Press Start 2P', cursive; font-size: clamp(8px,1.2vw,11px); color: var(--text); line-height: 1.6; word-break: break-word; }
    .card-title .icon { font-size: clamp(14px,2.5vw,20px); margin-right: 6px; }

    .badge { font-size: clamp(7px,1vw,9px); font-weight: 700; padding: 4px 10px; border-radius: 3px; letter-spacing: 1px; white-space: nowrap; }
    .badge-live { background: rgba(34,197,94,.15); color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
    .badge-building { background: rgba(234,179,8,.12); color: var(--gold); border: 1px solid rgba(234,179,8,.3); }

    .card-desc { font-size: clamp(12px,1.5vw,14px); color: var(--text-dim); line-height: 1.7; flex: 1; }

    .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: clamp(8px,1vw,10px); color: var(--text-dim); letter-spacing: 2px; }
    .progress-pct { font-family: 'Press Start 2P', cursive; font-size: clamp(9px,1.2vw,12px); }
    .progress-pct.green { color: #22c55e; }
    .progress-pct.gold { color: var(--gold); }
    .progress-track { height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; }
    .progress-fill.green { background: #22c55e; }
    .progress-fill.gold { background: var(--gold); }

    .card-btn { display: inline-block; text-align: center; padding: 10px 18px; font-size: clamp(9px,1.2vw,11px); font-weight: 700; text-decoration: none; border-radius: 3px; letter-spacing: 1px; align-self: flex-start; transition: opacity .2s; }
    .card-btn:hover { opacity: .85; }
    .btn-live { background: var(--gold); color: #000; }
    .btn-building { background: rgba(234,179,8,.15); color: var(--gold); border: 1px solid rgba(234,179,8,.4); cursor: default; }

    .footer { text-align: center; padding: 24px; font-size: 10px; color: var(--text-dim); border-top: 1px solid var(--border); margin-top: 40px; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">◈ <span>THEMACHINE</span></a>
  <ul class="nav-links">
    <li><a href="/demand-lab/">Demand Lab</a></li>
    <li><a href="/demo/" class="active">Demo</a></li>
    <li><a href="/">Home</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>// What We've Built</h1>
  <p>Live products and active projects — synced from our Demand Lab pipeline.</p>
</div>

<div class="container">
  <div class="demo-grid" id="demo-grid">
    <p style="color:var(--text-dim);text-align:center;padding:60px;font-size:13px;">Loading...</p>
  </div>
</div>

<div class="footer">
  THEMACHINE Corp. · <a href="/" style="color:var(--cyan)">themachine-corp.pages.dev</a>
</div>

<script>
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

fetch('/demand-lab/demand-cards.json')
  .then(r => r.json())
  .then(data => {
    const grid = document.getElementById('demo-grid');
    const cards = (data.cards||[]).filter(c => c.status === 'shipped' || c.status === 'in_dev');

    if (!cards.length) {
      grid.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:60px;font-size:13px">Nothing here yet.</p>';
      return;
    }

    grid.innerHTML = cards.map(card => {
      const isShipped = card.status === 'shipped';
      const isInDev = card.status === 'in_dev';
      const icon = isShipped ? '🚀' : '🔥';
      const badgeClass = isShipped ? 'badge-live' : 'badge-building';
      const badgeText = isShipped ? 'LIVE' : 'IN DEV';
      const progClass = isShipped ? 'green' : 'gold';
      const progPctClass = isShipped ? 'green' : 'gold';
      const btnClass = isShipped ? 'btn-live' : 'btn-building';
      const btnText = isShipped ? 'View Project ↗' : 'In Progress';
      const cardClass = isInDev ? ' in_dev' : '';

      return `<div class="card${cardClass}">
  <div class="card-header">
    <div class="card-title"><span class="icon">${icon}</span>${esc(card.title)}</div>
    <span class="badge ${badgeClass}">${badgeText}</span>
  </div>
  <div class="card-desc">${esc(card.description)}</div>
  ${card.url ? `<a href="${esc(card.url)}" class="card-btn ${btnClass}" target="_blank">${btnText}</a>` : `<span class="card-btn ${btnClass}">${btnText}</span>`}
  ${isInDev ? `
  <div>
    <div class="progress-meta">
      <span class="progress-label">PROGRESS</span>
      <span class="progress-pct ${progPctClass}">${card.progress}%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill ${progClass}" style="width:${card.progress}%"></div>
    </div>
  </div>` : ''}
</div>`;
    }).join('');
  })
  .catch(() => {
    document.getElementById('demo-grid').innerHTML =
      '<p style="color:var(--text-dim);text-align:center;padding:60px;font-size:13px">Failed to load demos.</p>';
  });
</script>
</body>
</html>
