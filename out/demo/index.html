    :root {
      --bg: #0a0a0f;
      --surface: #111120;
      --surface2: #181830;
      --text: #e0e0e0;
      --text-dim: #777;
      --gold: #d4af37;
      --cyan: #00e5ff;
      --green: #22c55e;
      --yellow: #eab308;
      --border: rgba(0,229,255,.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Press Start 2P', cursive; line-height: 1.6; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
    nav .logo { font-family: 'Press Start 2P', cursive; font-size: clamp(8px,1.5vw,12px); color: var(--cyan); text-decoration: none; white-space: nowrap; }
    nav .logo span { color: var(--gold); }
    nav .nav-links { display: flex; gap: 20px; list-style: none; flex-wrap: wrap; }
    nav .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 12px; transition: color .2s; }
    nav .nav-links a:hover { color: var(--text); }
    nav .nav-links a.active { color: var(--gold); }

    .page-header { text-align: center; padding: 60px 24px 40px; }
    .page-header h1 { font-family: 'Press Start 2P', cursive; font-size: clamp(12px,2.5vw,22px); color: var(--text); margin-bottom: 14px; line-height: 1.5; }
    .page-header p { color: var(--text-dim); font-size: clamp(12px,2vw,15px); }

    .section-label { font-family: 'Press Start 2P', cursive; font-size: clamp(9px,1.5vw,13px); color: var(--cyan); text-align: center; letter-spacing: 2px; margin-bottom: 8px; }
    .section-divider { width: 48px; height: 2px; background: linear-gradient(90deg, var(--gold), var(--cyan)); margin: 0 auto 12px; }
    .section-sub { text-align: center; color: var(--text-dim); font-size: clamp(11px,1.8vw,14px); margin-bottom: 40px; }

    .container { max-width: 960px; margin: 0 auto; padding: 0 24px 80px; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 28px 24px; display: flex; flex-direction: column; gap: 16px; transition: border-color .3s, transform .3s; }
    .card:hover { border-color: rgba(0,229,255,.4); transform: translateY(-2px); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-title { font-family: 'Press Start 2P', cursive; font-size: clamp(8px,1.2vw,11px); color: var(--text); line-height: 1.6; word-break: break-word; }
    .card-title .icon { font-size: clamp(14px,2.5vw,20px); margin-right: 6px; }

    .badge { font-size: clamp(7px,1vw,9px); font-weight: 700; padding: 4px 10px; border-radius: 3px; letter-spacing: 1px; white-space: nowrap; }
    .badge-live { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .badge-building { background: rgba(234,179,8,.12); color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }

    .card-desc { font-size: clamp(12px,1.5vw,14px); color: var(--text-dim); line-height: 1.7; flex: 1; }

    .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: clamp(8px,1vw,10px); color: var(--text-dim); letter-spacing: 2px; }
    .progress-pct { font-family: 'Press Start 2P', cursive; font-size: clamp(9px,1.2vw,12px); }
    .progress-pct.green { color: var(--green); }
    .progress-pct.gold { color: var(--gold); }
    .progress-pct.dim { color: var(--text-dim); }
    .progress-track { height: 8px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; }
    .progress-fill.green { background: var(--green); }
    .progress-fill.gold { background: var(--gold); }
    .progress-fill.dim { background: rgba(255,255,255,.2); }

    .card-btn { display: inline-block; text-align: center; padding: 10px 18px; font-size: clamp(9px,1.2vw,11px); font-weight: 700; text-decoration: none; border-radius: 3px; letter-spacing: 1px; align-self: flex-start; transition: opacity .2s; }
    .card-btn:hover { opacity: .85; }
    .btn-live { background: var(--gold); color: #000; }
    .btn-coming { background: rgba(255,255,255,.06); color: var(--text-dim); border: 1px solid rgba(255,255,255,.1); cursor: default; }

    .note { text-align: center; color: var(--text-dim); font-size: clamp(10px,1.3vw,12px); margin-top: 32px; padding: 16px; border-top: 1px solid var(--border); }
    .empty-state { color: var(--text-dim); font-size: 13px; text-align: center; padding: 32px; }
  </style>
</head>

  const ICONS = { product:'🛒', tools:'🔧', 'ai-agents':'🤖', bounty:'⚡', other:'📦' };
  const STATUS_BADGE = { shipped:'<span class="badge badge-live">● LIVE</span>', in_dev:'<span class="badge badge-building">◷ BUILDING</span>' };

  function cardHTML(card) {
    const icon = ICONS[card.category] || '📦';

    const color = PROGRESS_COLOR[card.status] || 'dim';

    const btn = url
