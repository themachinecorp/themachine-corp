<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; }
        .card { text-align: center; padding: 40px; border: 1px solid #1a1a1a; }
        .title { font-size: 1.2rem; color: #fff; margin-bottom: 30px; }
        .tools { display: flex; gap: 30px; margin-bottom: 30px; }
        .tool { color: #c0c0c0; font-size: 0.9rem; }
        .tool::before { content: '✓ '; color: #00ff88; }
        .price { font-size: 2rem; color: #00ff88; margin-bottom: 20px; }
        .price span { font-size: 1rem; color: #606060; }
        .url { color: #606060; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">AI Content Tools</div>
        <div class="tools">
            <div class="tool">FORGE</div>
            <div class="tool">SOCIAL</div>
            <div class="tool">SHORTFORM</div>
        </div>
        <div class="price">$15<span>/month</span></div>
        <div class="url">themachine-corp.pages.dev</div>
    </div>
</body>
</html>
