<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日祝福头像生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            display: none;
        }
        .upload-area p {
            color: #666;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .template-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .template-item {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid transparent;
            overflow: hidden;
            transition: all 0.3s;
        }
        .template-item.active {
            border-color: #667eea;
        }
        .template-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
        }
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        .result img {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎂 生日祝福头像生成器</h1>
        
        <div class="upload-area" onclick="document.getElementById('photo').click()">
            <img id="preview" src="" alt="预览">
            <p id="uploadText">点击上传照片</p>
            <input type="file" id="photo" accept="image/*" style="display:none" onchange="handleUpload(event)">
        </div>
        
        <div class="input-group">
            <label>祝福语（最多8字）</label>
            <input type="text" id="wish" placeholder="生日快乐" maxlength="8">
        </div>
        
        <div class="input-group">
            <label>选择模板</label>
            <div class="template-list">
                <div class="template-item active" onclick="selectTemplate(0)">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF6B6B' width='100' height='100'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='white' font-size='20'%3E模板1%3C/text%3E%3C/svg%3E" alt="模板1">
                </div>
                <div class="template-item" onclick="selectTemplate(1)">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%234ECDC4' width='100' height='100'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='white' font-size='20'%3E模板2%3C/text%3E%3C/svg%3E" alt="模板2">
                </div>
                <div class="template-item" onclick="selectTemplate(2)">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FFE66D' width='100' height='100'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='%23333' font-size='20'%3E模板3%3C/text%3E%3C/svg%3E" alt="模板3">
                </div>
            </div>
        </div>
        
        <button class="generate-btn" onclick="generate()">生成生日头像</button>
        
        <div class="result" id="result">
            <img id="resultImg" src="" alt="结果">
            <br>
            <a id="downloadLink" class="download-btn" download="birthday-avatar.png">保存图片</a>
        </div>
    </div>

    <script>
        let uploadedImg = null;
        let selectedTemplate = 0;
        
        const templates = ['#FF6B6B', '#4ECDC4', '#FFE66D'];
        
        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedImg = new Image();
                uploadedImg.onload = function() {
                    document.getElementById('preview').src = event.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('uploadText').style.display = 'none';
                };
                uploadedImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function selectTemplate(index) {
            selectedTemplate = index;
            document.querySelectorAll('.template-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }
        
        function generate() {
            if (!uploadedImg) {
                alert('请先上传照片');
                return;
            }
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 500;
            canvas.height = 500;
            
            // 背景
            ctx.fillStyle = templates[selectedTemplate];
            ctx.fillRect(0, 0, 500, 500);
            
            // 圆角照片
            const photoSize = 300;
            const photoX = (500 - photoSize) / 2;
            const photoY = 50;
            
            ctx.save();
            ctx.beginPath();
            ctx.roundRect(photoX, photoY, photoSize, photoSize, 20);
            ctx.clip();
            ctx.drawImage(uploadedImg, photoX, photoY, photoSize, photoSize);
            ctx.restore();
            
            // 照片边框
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.roundRect(photoX, photoY, photoSize, photoSize, 20);
            ctx.stroke();
            
            // 祝福语
            const wish = document.getElementById('wish').value || '生日快乐';
            ctx.fillStyle = 'white';
            ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(wish, 250, 420);
            
            // 显示结果
            const resultImg = document.getElementById('resultImg');
            resultImg.src = canvas.toDataURL('image/png');
            document.getElementById('downloadLink').href = canvas.toDataURL('image/png');
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
